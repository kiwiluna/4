<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prop Bills Shop • Custom Mix Packs</title>
  <style>
    :root { --primary: #00ff9d; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background:#111; color:#eee; line-height:1.6; }
    header { background:#000; padding:25px 20px; border-bottom:3px solid var(--primary); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; }
    h1 { font-size:2.4rem; color:#fff; font-weight:700; }
    .subtitle { color:#aaa; font-size:1.1rem; max-width:700px; }
    .telegram-header { background:#111; color:var(--primary); padding:8px 20px; border-radius:8px; font-weight:600; display:flex; align-items:center; gap:8px; white-space:nowrap; }
    .lang-switch { display:flex; gap:8px; }
    .lang-btn { padding:8px 18px; background:#222; color:#eee; border:1px solid #444; border-radius:6px; font-size:1rem; cursor:pointer; transition:all 0.2s; }
    .lang-btn.active { background:var(--primary); color:#000; border-color:var(--primary); font-weight:600; }
    .container { max-width:1280px; margin:0 auto; padding:40px 20px; display:grid; grid-template-columns:1fr 380px; gap:40px; }
    .products-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:25px; }
    .card { background:#1f1f1f; border-radius:12px; overflow:hidden; transition:all 0.3s; border:2px solid #333; }
    .card:hover { transform:translateY(-6px); border-color:var(--primary); }
    .card-header { background:#000; padding:20px; text-align:center; font-size:1.4rem; font-weight:600; }
    .card-body { padding:25px; }
    .price { font-size:2.2rem; font-weight:700; color:var(--primary); margin:15px 0; }
    .bills { background:#222; padding:10px 16px; border-radius:8px; display:inline-block; margin-bottom:15px; font-size:1rem; font-weight:500; }
    button.add { width:100%; background:var(--primary); color:#000; border:none; padding:16px; font-size:1.1rem; font-weight:600; border-radius:8px; cursor:pointer; }
    button.add:hover { background:#00cc7a; }
    .cart { background:#1f1f1f; border-radius:12px; padding:25px; position:sticky; top:30px; }
    .cart h2 { margin-bottom:20px; color:#fff; font-size:1.5rem; font-weight:600; }
    .cart-item { display:flex; justify-content:space-between; margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid #333; }
    .total { font-size:1.9rem; font-weight:700; color:var(--primary); margin:25px 0 10px; text-align:right; }
    .btn-final { width:100%; background:#ff0066; color:white; border:none; padding:18px; font-size:1.25rem; font-weight:700; border-radius:12px; cursor:pointer; }
    .btn-final:disabled { background:#444; cursor:not-allowed; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); align-items:center; justify-content:center; z-index:1000; }
    .modal-content { background:#1f1f1f; width:90%; max-width:640px; border-radius:16px; padding:35px; max-height:90vh; overflow-y:auto; }
    .modal-content h2 { color:#fff; margin-bottom:10px; font-size:1.6rem; }
    label { display:block; margin:20px 0 8px; font-weight:600; color:#ddd; }
    input, textarea { width:100%; padding:14px; margin-bottom:20px; background:#222; border:none; border-radius:8px; color:#eee; font-size:1.1rem; }
    .payment-dynamic { margin:25px 0; }
    .crypto-box { background:#000; padding:25px; border-radius:12px; border:2px solid #00ff9d; }
    .interac-box { background:#000; padding:25px; border-radius:12px; text-align:center; border:2px solid #ff0066; }
    .converter { background:#111; padding:20px; border-radius:12px; margin-top:20px; font-size:1.1rem; line-height:1.5; }
    .converter a { color:var(--primary); text-decoration:underline; }
    .qr-code { max-width: 280px; margin: 20px auto; display: block; border: 3px solid #fff; border-radius: 12px; }
    .success-screen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; z-index:2000; }
    .success-screen h1 { color:var(--primary); font-size:2.8rem; margin-bottom:15px; }
    .formule { background:#1a1a1a; padding:35px; border-radius:16px; max-width:620px; margin:35px 0; font-size:1.35rem; line-height:1.8; white-space:pre-wrap; border:1px solid #333; }
    .footer { text-align:center; padding:40px 20px; color:#666; font-size:0.95rem; border-top:1px solid #222; }
  </style>
</head>
